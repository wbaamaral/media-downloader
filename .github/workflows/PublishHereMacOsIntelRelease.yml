name: Publish Here macOS Intel Release
env:
  QT6_VERSION: "6.6.2"
  BUILD_TYPE: "Release"
on:
  push:
    tags:
    - '*'
permissions:
  contents: write
jobs:
  release:
    runs-on: macos-14
    steps:
    -
      uses: actions/checkout@v4
      with:
         repository: wbaamaral/media-downloader
         path: MAC
    -
      name: Install Qt 6
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT6_VERSION }}
        arch: 'clang_64'
        dir: "${{github.workspace}}/qt6"
        install-deps: "true"
        host: 'mac'
        target: 'desktop'
    -
      name: Configure Qt 6
      env:
        CMAKE_PREFIX_PATH: "${{github.workspace}}/qt6/Qt/${{ env.QT6_VERSION }}"
      run: cmake -DCMAKE_OSX_ARCHITECTURES="x86_64" -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/MediaDownloader -DBUILD_WITH_QT6=true -DSOURCE_PATH=${{github.workspace}}/MAC/ -DCMAKE_VERBOSE_MAKEFILE=FALSE -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -S ${{github.workspace}}/MAC/ -B ${{github.workspace}}/MAC/build6
    -
      name: Build App
      run: cmake --build ${{github.workspace}}/MAC/build6
    -
      name: Stage Third-Party Assets
      run: |
           #aria2c -d ${{github.workspace}}/MAC/build6/MediaDownloader.app/Contents/MacOS/extra https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp

           mkdir -p ${{github.workspace}}/MAC/build6/MediaDownloader.app/Contents/MacOS/extra
           mkdir -p ${{github.workspace}}/MAC/build6/MediaDownloader.app/Contents/Resources

           cp ${{github.workspace}}/MAC/src/media-downloader.icns ${{github.workspace}}/MAC/build6/MediaDownloader.app/Contents/Resources/MediaDownloader.icns

           aria2c -d ${{github.workspace}}/MAC/build6/MediaDownloader.app/Contents/MacOS/extra https://github.com/wbaamaral/media-downloader-git/releases/download/0.0.0/ffmpeg-macos-intel.zip

           cd ${{github.workspace}}/MAC/build6/MediaDownloader.app/Contents/MacOS/extra
           unzip -o ffmpeg-macos-intel.zip
           rm -rf ffmpeg-macos-intel.zip
    -
      name: Create DMG
      run: |
           cd ${{github.workspace}}/MAC/build6
           ${{github.workspace}}/qt6/Qt/${{ env.QT6_VERSION }}/macos/bin/macdeployqt6 MediaDownloader.app -dmg
    - name: Read Version
      run: |
           version=`cat ${{github.workspace}}/MAC/build6/VERSION_INFO`
           echo -n "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
    -
      name: Rename DMG
      run: |
           cp ${{github.workspace}}/MAC/build6/MediaDownloader.dmg ${{github.workspace}}/MAC/build6/MediaDownloaderQt6-x86_64-${{ env.RELEASE_VERSION }}.dmg
    -
     name: Checksum
     run: | 
          cd ${{github.workspace}}/MAC/build6
          shasum -a 256 MediaDownloaderQt6-x86_64-${{ env.RELEASE_VERSION }}.dmg > ${{github.workspace}}/macOSIntelReleaseHash.txt
    -
      name: Publish Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: ${{github.workspace}}/macOSIntelReleaseHash.txt,${{github.workspace}}/MAC/build6/MediaDownloaderQt6-x86_64-${{ env.RELEASE_VERSION }}.dmg
        tag: ${{ env.RELEASE_VERSION }}
        commit: "main"
        allowUpdates: true
        prerelease: true
        omitBody: true
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        omitPrereleaseDuringUpdate: true
